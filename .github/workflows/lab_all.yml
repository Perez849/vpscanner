name: Super Laboratorio

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Correr el super laboratorio (4 tipos)
        run: |
          cd scanner
          python lab_all.py --fetch
      - name: Guardar resultados
        run: |
          git config user.name  "vp-scanner-bot"
          git config user.email "bot@users.noreply.github.com"
          git add scanner/lab_all.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "lab: super análisis 4 tipos $(date -u +%Y-%m-%d)"
            git push
          fi
