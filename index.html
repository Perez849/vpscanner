<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VP Scanner · Visor</title>
<style>
  :root{
    --bg:#fbfbf9; --card:#ffffff; --ink:#1a1d23; --sub:#6b7280; --dim:#9ca3af;
    --rule:#eceae4; --rule2:#e2e0d8; --ink2:#f5f4f0; --ink3:#fafaf8;
    --emerald:#0f9d58; --ember:#d93838; --amber:#d99000; --cyan:#0891b2;
    --sapphire:#2563eb; --violet:#7c3aed;
    --f-display:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    --f-text:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --f-mono:'SF Mono','Roboto Mono',Menlo,Consolas,monospace;
    --r:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--f-text);-webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 80px}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;padding:8px 0 18px;border-bottom:2px solid var(--ink)}
  h1{font-family:var(--f-display);font-size:26px;font-weight:800;margin:0;letter-spacing:-.01em}
  .badge-ver{font-family:var(--f-mono);font-size:11px;background:var(--sapphire);color:#fff;padding:2px 8px;border-radius:5px;font-weight:700}
  .meta{font-family:var(--f-mono);font-size:11px;color:var(--sub);margin-left:auto}
  .meta b{color:var(--emerald)}
  .loading{text-align:center;padding:80px 20px;color:var(--sub);font-family:var(--f-mono);font-size:13px}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:var(--r);padding:16px 18px;font-size:13px;margin:20px 0;line-height:1.6}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:18px 0 14px}
  .controls input{flex:1;min-width:180px;font-family:var(--f-text);font-size:13px;padding:7px 11px;border:1px solid var(--rule2);border-radius:8px;background:var(--card);color:var(--ink)}
  .seg{display:flex;border:1px solid var(--rule2);border-radius:8px;overflow:hidden}
  .seg button{font-family:var(--f-mono);font-size:11px;padding:7px 12px;border:0;background:var(--card);color:var(--sub);cursor:pointer}
  .seg button.on{background:var(--ink);color:#fff;font-weight:700}
  .toplbl{font-family:var(--f-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin:18px 0 8px}
  .toplbl.lab{color:var(--emerald)} .toplbl.unl{color:var(--dim)}
  .topgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:8px}
  .tcard{background:var(--card);border:1px solid var(--rule2);border-radius:var(--r);padding:13px 15px;cursor:pointer;transition:border-color .12s}
  .tcard:hover{border-color:var(--sapphire)}
  .tcard.best{border-color:var(--emerald)}
  .tc-head{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .tc-sym{font-family:var(--f-display);font-weight:700;font-size:15px}
  .tc-tf{font-family:var(--f-mono);font-size:8px;background:var(--ink2);padding:1px 5px;border-radius:4px;color:var(--sub)}
  .tc-sig{font-family:var(--f-mono);font-size:8px;font-weight:700;margin-left:auto}
  .tc-box{background:var(--ink2);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-family:var(--f-mono);font-size:10px;line-height:1.7}
  .tc-box .row{display:flex;justify-content:space-between}
  .tc-grid{display:grid;grid-template-columns:auto 1fr;gap:2px 8px;font-family:var(--f-mono);font-size:9px;line-height:1.5}
  .tc-grid .k{color:var(--dim)}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  thead td{font-family:var(--f-mono);font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--sub);padding:8px 10px;border-bottom:2px solid var(--rule2);cursor:pointer;user-select:none}
  tbody td{padding:9px 10px;border-bottom:1px solid var(--rule)}
  tbody tr{cursor:pointer} tbody tr:hover{background:var(--ink3)}
  .sym{font-family:var(--f-display);font-weight:700}
  .mono{font-family:var(--f-mono);font-size:12px}
  .sig-badge{font-family:var(--f-mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px}
  .stats{background:var(--card);border:1px solid var(--rule2);border-radius:var(--r);padding:16px 18px;margin:22px 0}
  .stats h2{font-family:var(--f-display);font-size:17px;margin:0 0 4px}
  .stable{display:grid;grid-template-columns:auto repeat(3,1fr);gap:0 10px;font-family:var(--f-mono);font-size:12px;align-items:center}
  .stable .hd{font-size:9px;color:var(--dim);text-transform:uppercase;text-align:right;padding-bottom:8px}
  .stable .lb{color:var(--sub);font-size:10px;padding:5px 0;border-bottom:1px solid var(--rule)}
  .stable .vl{text-align:right;padding:5px 0;border-bottom:1px solid var(--rule)}
  .good{color:var(--emerald);font-weight:700}
  .typehd{font-family:var(--f-mono);font-size:11px;font-weight:700;margin:16px 0 4px;padding-top:10px;border-top:1px solid var(--rule)}
  .overlay{position:fixed;inset:0;background:rgba(20,22,28,.55);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:30px 16px;overflow-y:auto}
  .overlay.on{display:flex}
  .modal{background:var(--card);border-radius:14px;max-width:760px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden}
  .m-hd{display:flex;align-items:center;gap:10px;padding:18px 22px;border-bottom:1px solid var(--rule);flex-wrap:wrap}
  .m-hd .x{margin-left:auto;cursor:pointer;font-size:22px;color:var(--dim);line-height:1;border:0;background:0}
  .m-body{padding:18px 22px;max-height:70vh;overflow-y:auto}
  .m-sec{font-family:var(--f-mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin:18px 0 8px}
  .m-sec:first-child{margin-top:0}
  .lvls{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
  .lvl{background:var(--ink2);border-radius:8px;padding:9px 11px}
  .lvl .lk{font-family:var(--f-mono);font-size:8px;color:var(--sub);text-transform:uppercase}
  .lvl .lv{font-family:var(--f-mono);font-size:14px;font-weight:700;margin-top:2px}
  .scn{background:var(--ink3);border-left:3px solid var(--sapphire);border-radius:6px;padding:10px 12px;font-size:12.5px;line-height:1.55}
  .btstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px}
  .bs{background:var(--ink2);border-radius:8px;padding:9px;text-align:center}
  .bs .bn{font-family:var(--f-mono);font-size:17px;font-weight:800}
  .bs .bl{font-family:var(--f-mono);font-size:8px;color:var(--sub);text-transform:uppercase;margin-top:2px}
  .thist{width:100%;border-collapse:collapse;font-size:11px;font-family:var(--f-mono)}
  .thist td{padding:5px 7px;border-bottom:1px solid var(--rule)}
  .thist .h td{font-size:8px;color:var(--dim);text-transform:uppercase}
  .tfilt{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .tfilt button{font-family:var(--f-mono);font-size:10px;padding:4px 10px;border:1px solid var(--rule2);border-radius:14px;background:var(--card);color:var(--sub);cursor:pointer}
  .tfilt button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .foot{font-family:var(--f-mono);font-size:10px;color:var(--dim);text-align:center;margin-top:30px;line-height:1.7}
  @media(max-width:640px){ .hide-sm{display:none} h1{font-size:21px} }
  .tabs{display:flex;gap:6px;margin:4px 0 16px}
  .tabs button{flex:0 0 auto;padding:8px 16px;border:1px solid var(--rule2);background:var(--card);color:var(--sub);border-radius:9px;font-family:var(--f-text);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
  .tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tabs .pill{background:var(--sapphire);color:#fff;font-family:var(--f-mono);font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700}
  .seg-head{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:6px 0}
  .seg-card{background:var(--card);border:1px solid var(--rule2);border-radius:11px;padding:14px 10px;text-align:center}
  .seg-n{font-family:var(--f-display);font-size:22px;font-weight:800;color:var(--ink)}
  .seg-l{font-family:var(--f-mono);font-size:10px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>VP Scanner</h1>
    <span class="badge-ver">élite · 1d</span>
    <span class="meta" id="meta">cargando…</span>
  </header>
  <div id="app"><div class="loading">Leyendo datos del servidor…</div></div>
  <div class="foot">
    Datos generados por el robot diario en GitHub · El navegador solo lee, no calcula<br>
    Cifras del backtest NETAS de costes (0.30% por operación) · Solo alertas de élite (nichos validados) · Pincha para el detalle
  </div>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<script>
const BASE='https://raw.githubusercontent.com/Perez849/vpscanner/main/scanner/data/';
const bust=()=>'?t='+Math.floor(Date.now()/60000);
const SIG_COLOR={LONG:'var(--emerald)',SHORT:'var(--ember)',RANGE_LONG:'var(--cyan)',RANGE_SHORT:'var(--amber)'};
const SIG_BG={LONG:'#e7f6ee',SHORT:'#fdeaea',RANGE_LONG:'#e6f6fa',RANGE_SHORT:'#fcf3e0'};
const LABEL_ICON={caida_giro:'💎💎',caida_recorrido:'💎',empuje_favor:'⭐',rango_extendido:'🚀',corto_favor:'🛡️',corto_estrecho:'🎯',
  // compatibilidad con claves antiguas por si quedan JSON viejos:
  pelotazo_max:'💎💎',pelotazo:'💎',seguro:'🛡️',premium:'⭐',rebote:'🛡️'};
const LABEL_NAME={caida_giro:'Caída + giro fuerte',caida_recorrido:'Caída con recorrido',empuje_favor:'Empuje a favor',rango_extendido:'Rango extendido',corto_favor:'Corto a favor de tendencia',corto_estrecho:'Corto en rango estrecho',
  pelotazo_max:'Pelotazo máximo',pelotazo:'Pelotazo',seguro:'Seguro',premium:'Premium',rebote:'Rebote'};
const TYPE_NAME={LONG:'LONG · reversión bajo VAL',SHORT:'SHORT · reversión sobre VAH',RANGE_LONG:'RANGE LONG · dentro del VA, al alza',RANGE_SHORT:'RANGE SHORT · dentro del VA, a la baja'};
let STATE={signals:{},history:{},stats:null,meta:null,seg:null,view:'alertas',tf:'1d',q:'',sort:'wr',dir:-1};
let MODAL={key:null,filter:'all'};
const f=(x,d=2)=>x==null?'—':Number(x).toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d});
const icon=c=>c?(LABEL_ICON[c]||''):'';
const sigTxt=s=>(s||'').replace('_',' ');

async function loadAll(){
  try{
    const [sig,his,st,mt,seg]=await Promise.all([
      fetch(BASE+'signals.json'+bust()).then(r=>{if(!r.ok)throw new Error('signals '+r.status);return r.json();}),
      fetch(BASE+'history.json'+bust()).then(r=>r.ok?r.json():{}).catch(()=>({})),
      fetch(BASE+'stats.json'+bust()).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(BASE+'meta.json'+bust()).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(BASE+'seguimiento_vivo.json'+bust()).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    STATE.signals=sig;STATE.history=his;STATE.stats=st;STATE.meta=mt;STATE.seg=seg;render();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="err"><b>No pude leer los datos.</b><br>Comprueba que el robot ha corrido y existe:<br><span style="font-family:var(--f-mono);font-size:11px">'+BASE+'signals.json</span><br><br>Detalle: '+e.message+'</div>';
  }
}
function fmtDate(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString('es-ES',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}catch{return iso;}}
function fmtTs(ts){if(!ts)return'—';try{return new Date(ts).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'2-digit'});}catch{return'—';}}

function rows(){
  let out=Object.entries(STATE.signals).map(([key,s])=>({key,...s}));
  if(STATE.q){const q=STATE.q.toLowerCase();out=out.filter(s=>(s.sym||'').toLowerCase().includes(q)||(s.sector||'').toLowerCase().includes(q));}
  const val=s=>STATE.sort==='wr'?(s.bt?.wr??-1):STATE.sort==='pnl'?(s.bt?.avgPnl??-999):STATE.sort==='rr'?(s.rr??-1):STATE.sort==='sym'?s.sym:(s.bt?.wr??-1);
  out.sort((a,b)=>{const va=val(a),vb=val(b);return typeof va==='string'?STATE.dir*va.localeCompare(vb):STATE.dir*(va-vb);});
  return out;
}
function cardHtml(s,i,medal){
  const col=SIG_COLOR[s.signal]||'var(--sub)',ic=icon(s.labelClass);
  const tgtPct=(s.target&&s.entry)?((s.target-s.entry)/s.entry*100):null;
  const stopPct=(s.stop&&s.entry)?((s.stop-s.entry)/s.entry*100):null;
  return `<div class="tcard ${i===0?'best':''}" onclick="openModal('${s.key}')">
    <div class="tc-head"><span>${medal||''}</span><span class="tc-sym">${s.sym}</span>
      ${ic?`<span title="${LABEL_NAME[s.labelClass]}">${ic}</span>`:''}
      <span class="tc-tf">${(s.tf||'').toUpperCase()}</span>
      <span class="tc-sig" style="color:${col}">${sigTxt(s.signal)}</span></div>
    <div class="tc-box">
      <div class="row"><span style="color:var(--sub)">Entrada</span><span style="font-weight:700">${f(s.entry)}</span></div>
      <div class="row"><span style="color:var(--emerald)">🎯 Objetivo</span><span style="color:var(--emerald)">${f(s.target)} ${tgtPct!=null?`<span style="font-size:8px">(${tgtPct>=0?'+':''}${tgtPct.toFixed(1)}%)</span>`:''}</span></div>
      <div class="row"><span style="color:var(--amber)">◆ Stop</span><span style="color:var(--amber)">${f(s.stop)} ${stopPct!=null?`<span style="font-size:8px">(${stopPct.toFixed(1)}%)</span>`:''}</span></div>
    </div>
    <div class="tc-grid">
      <span class="k">Acierto hist.</span><span class="good">${s.bt?.wr??'—'}% <span style="color:var(--dim);font-weight:400">(${s.bt?.total??0} ops)</span></span>
      <span class="k">Ganancia/op</span><span>${s.bt?.avgPnl!=null?(s.bt.avgPnl>=0?'+':'')+s.bt.avgPnl+'%':'—'}</span>
      <span class="k">Ratio R:R</span><span style="color:var(--violet)">${s.rr?'1:'+s.rr:'—'}</span>
    </div></div>`;
}
function render(){
  const m=STATE.meta;
  document.getElementById('meta').innerHTML=m?`<b>${m.symbolsOK}</b> símbolos · ${m.totalTrades?.toLocaleString('es-ES')||'—'} ops élite · act. ${fmtDate(m.generatedAt)}`:'';
  // Conmutador de pestañas
  const segOpen=STATE.seg?.stats?.global?.open||0;
  const tabs=`<div class="tabs">
    <button class="${STATE.view==='alertas'?'on':''}" onclick="STATE.view='alertas';render()">📡 Alertas de hoy</button>
    <button class="${STATE.view==='seguimiento'?'on':''}" onclick="STATE.view='seguimiento';render()">📈 Seguimiento en vivo${segOpen?` <span class="pill">${segOpen}</span>`:''}</button>
  </div>`;
  if(STATE.view==='seguimiento'){
    document.getElementById('app').innerHTML=tabs+segHtml();
    return;
  }
  const list=rows();
  const byWr=[...list].sort((a,b)=>(b.bt?.wr??-1)-(a.bt?.wr??-1));
  const top=byWr.slice(0,3);
  const medals=['🥇','🥈','🥉'];
  let html=tabs+`<div class="controls"><input id="q" type="text" placeholder="Buscar símbolo o sector…" value="${STATE.q}"></div>`;
  if(list.length){
    html+=`<div class="toplbl lab">🏆 Mejores alertas de élite ahora mismo</div>`;
    html+=`<div class="topgrid">`+top.map((s,i)=>cardHtml(s,i,medals[i])).join('')+`</div>`;
  } else {
    html+=`<div style="background:var(--card);border:1px solid var(--rule2);border-radius:var(--r);padding:24px;text-align:center;color:var(--sub);font-family:var(--f-mono);font-size:13px;margin:14px 0">
      No hay alertas de élite ahora mismo.<br><span style="font-size:11px;color:var(--dim)">El sistema solo muestra los nichos validados — es normal que algunos días no haya ninguna.</span></div>`;
  }
  const arrow=k=>STATE.sort===k?(STATE.dir<0?' ▼':' ▲'):'';
  html+=`<h2 style="font-family:var(--f-display);font-size:17px;margin:24px 0 4px">Alertas de élite (${list.length}) <span style="font-size:11px;color:var(--dim);font-family:var(--f-mono)">· pincha una fila</span></h2>
    <table><thead><tr>
      <td data-s="sym">Símbolo${arrow('sym')}</td><td>Señal</td><td>Tipo de alerta</td>
      <td style="text-align:right">Entrada</td><td style="text-align:right" class="hide-sm">Objetivo</td><td style="text-align:right" class="hide-sm">Stop</td>
      <td style="text-align:right" data-s="rr">R:R${arrow('rr')}</td><td style="text-align:right" data-s="wr">Acierto${arrow('wr')}</td><td style="text-align:right" data-s="pnl">Gan/op${arrow('pnl')}</td>
    </tr></thead><tbody>`;
  for(const s of list){
    const col=SIG_COLOR[s.signal]||'var(--sub)',bg=SIG_BG[s.signal]||'var(--ink2)',ic=icon(s.labelClass);
    html+=`<tr onclick="openModal('${s.key}')">
      <td class="sym">${s.sym} <span style="color:var(--dim);font-weight:400;font-size:10px">${s.sector||''}</span></td>
      <td><span class="sig-badge" style="color:${col};background:${bg}">${sigTxt(s.signal)}</span></td>
      <td>${ic?`${ic} <span style="font-size:11px;color:var(--sub)">${LABEL_NAME[s.labelClass]||''}</span>`:'<span style="color:var(--dim)">—</span>'}</td>
      <td style="text-align:right" class="mono">${f(s.entry)}</td>
      <td style="text-align:right;color:var(--emerald)" class="mono hide-sm">${f(s.target)}</td>
      <td style="text-align:right;color:var(--amber)" class="mono hide-sm">${f(s.stop)}</td>
      <td style="text-align:right;color:var(--violet)" class="mono">${s.rr?'1:'+s.rr:'—'}</td>
      <td style="text-align:right" class="mono"><b>${s.bt?.wr??'—'}%</b> <span style="color:var(--dim);font-size:10px">(${s.bt?.total??0})</span></td>
      <td style="text-align:right;color:${(s.bt?.avgPnl??0)>=0?'var(--emerald)':'var(--ember)'}" class="mono">${s.bt?.avgPnl!=null?(s.bt.avgPnl>=0?'+':'')+s.bt.avgPnl+'%':'—'}</td>
    </tr>`;
  }
  html+=`</tbody></table>`+statsHtml();
  document.getElementById('app').innerHTML=html;
  wire();
}
function statsHtml(){
  if(!STATE.stats)return'';
  const st=STATE.stats;
  const cell=(g,hi)=>`<div class="vl ${hi&&g&&g.wr!=null?'good':''}">${g&&g.wr!=null?g.wr+'%':'—'}</div>
    <div class="vl" style="color:${g&&g.pnl>=0?'var(--emerald)':'var(--ember)'}">${g&&g.pnl!=null?(g.pnl>=0?'+':'')+g.pnl+'%':'—'}</div>
    <div class="vl" style="color:var(--dim)">${g&&g.n!=null?g.n.toLocaleString('es-ES'):'—'}</div>`;
  const row=(lbl,g,strong,hi)=>`<div class="lb" style="${strong?'font-weight:700;color:var(--ink)':''}">${lbl}</div>`+cell(g,hi);

  // MODO ÉLITE: si stats.elite, mostramos solo el rendimiento de los nichos buenos.
  if(st.elite){
    let h=`<div class="stats"><h2>🏆 Rendimiento del sistema élite (solo 1d)</h2>
      <p style="color:var(--sub);font-size:12px;margin:0 0 12px">El sistema solo opera los nichos validados. Estas son las ${st.global?.n?.toLocaleString('es-ES')||'—'} operaciones de élite del histórico — el resto se descarta por completo.</p>
      <div class="stable"><div></div><div class="hd">Acierto</div><div class="hd">Gan/op</div><div class="hd">Ops</div>
        ${row('Sistema élite (todo)',st.global,true,true)}</div>`;
    if(st.byClass){
      h+=`<div class="typehd" style="color:var(--ink)">Por tipo de alerta</div><div class="stable"><div></div><div class="hd">Acierto</div><div class="hd">Gan/op</div><div class="hd">Ops</div>`;
      const CN={caida_giro:'💎💎 Caída + giro fuerte',caida_recorrido:'💎 Caída con recorrido',empuje_favor:'⭐ Empuje a favor',rango_extendido:'🚀 Rango extendido',corto_favor:'🛡️ Corto a favor de tendencia',corto_estrecho:'🎯 Corto en rango estrecho'};
      for(const c of ['caida_giro','caida_recorrido','empuje_favor','rango_extendido','corto_favor','corto_estrecho']){
        if(st.byClass[c]) h+=row(CN[c],st.byClass[c],false,true);
      }
      h+=`</div>`;
    }
    if(st.byType){
      h+=`<div class="typehd" style="color:var(--ink)">Por tipo de señal</div><div class="stable"><div></div><div class="hd">Acierto</div><div class="hd">Gan/op</div><div class="hd">Ops</div>`;
      for(const t of ['LONG','SHORT','RANGE_LONG','RANGE_SHORT']){
        const bt=st.byType[t]; if(bt&&bt.all&&bt.all.n) h+=`<div class="lb" style="color:${SIG_COLOR[t]};font-weight:700">${sigTxt(t)}</div>`+cell(bt.all,true);
      }
      h+=`</div>`;
    }
    return h+`</div>`;
  }

  // (Compatibilidad con JSON antiguo, antes de re-escanear en modo élite)
  let h=`<div class="stats"><h2>📊 ¿Funcionan las etiquetas? (histórico)</h2>
    <p style="color:var(--sub);font-size:12px;margin:0 0 12px">Datos del formato anterior. Re-escanea para ver el sistema élite.</p>
    <div class="stable"><div></div><div class="hd">Acierto</div><div class="hd">Gan/op</div><div class="hd">Ops</div>
      ${row('Todas',st.global,true)}${st.unlabeled?row('Sin etiqueta',st.unlabeled,true):''}${st.labeled?row('Etiquetadas ✦',st.labeled,true,true):''}</div>`;
  return h+`</div>`;
}
function segHtml(){
  const seg=STATE.seg;
  if(!seg||!seg.trades){
    return `<div style="background:var(--card);border:1px solid var(--rule2);border-radius:var(--r);padding:24px;text-align:center;color:var(--sub);font-family:var(--f-mono);font-size:13px;margin:14px 0">
      El seguimiento en vivo aún no tiene datos.<br><span style="font-size:11px;color:var(--dim)">El robot empieza a registrar alertas en su próxima ejecución. Vuelve en unos días.</span></div>`;
  }
  const g=seg.stats.global;
  const abiertas=seg.trades.filter(t=>t.status==='abierta');
  const cerradas=seg.trades.filter(t=>t.status==='cerrada').sort((a,b)=>(b.closedAt||0)-(a.closedAt||0));
  const pnlCol=v=>v>=0?'var(--emerald)':'var(--ember)';
  // Resumen
  let h=`<div class="seg-head">
    <div class="seg-card"><div class="seg-n">${g.wr??'—'}${g.wr!=null?'%':''}</div><div class="seg-l">Acierto real</div></div>
    <div class="seg-card"><div class="seg-n" style="color:${pnlCol(g.pnl||0)}">${g.pnl!=null?(g.pnl>=0?'+':'')+g.pnl+'%':'—'}</div><div class="seg-l">Ganancia/op real</div></div>
    <div class="seg-card"><div class="seg-n">${g.n||0}</div><div class="seg-l">Cerradas</div></div>
    <div class="seg-card"><div class="seg-n" style="color:var(--sapphire)">${g.open||0}</div><div class="seg-l">Abiertas</div></div>
  </div>
  <p style="color:var(--sub);font-size:12px;margin:4px 2px 16px">Cada alerta élite que sale se registra automáticamente con su entrada de ese día y se sigue hasta tocar stop u objetivo. Esto es el rendimiento <b>real en vivo</b>, medido igual que el backtest.${g.ambiguous?` <span style="color:var(--amber)">⚠ ${g.ambiguous} cierre(s) ambiguo(s) — la vela tocó stop y objetivo el mismo día (revisar).</span>`:''}</p>`;

  // Abiertas
  h+=`<h2 style="font-family:var(--f-display);font-size:16px;margin:18px 0 6px">Operaciones abiertas (${abiertas.length})</h2>`;
  if(abiertas.length){
    h+=`<table><thead><tr><td>Símbolo</td><td>Tipo</td><td style="text-align:right">Entrada</td><td style="text-align:right">Actual</td><td style="text-align:right">Flotante</td><td style="text-align:right" class="hide-sm">Objetivo</td><td style="text-align:right" class="hide-sm">Stop</td><td style="text-align:right">Días</td></tr></thead><tbody>`;
    for(const t of abiertas){
      h+=`<tr><td class="sym">${t.sym}</td>
        <td><span style="color:${SIG_COLOR[t.signal]}">${sigTxt(t.signal)}</span> ${icon(t.eliteClass)}</td>
        <td style="text-align:right" class="mono">${f(t.entry)}</td>
        <td style="text-align:right" class="mono">${t.curPrice!=null?f(t.curPrice):'—'}</td>
        <td style="text-align:right;color:${pnlCol(t.curPnlPct||0)}" class="mono">${t.curPnlPct!=null?(t.curPnlPct>=0?'+':'')+t.curPnlPct+'%':'—'}</td>
        <td style="text-align:right;color:var(--emerald)" class="mono hide-sm">${f(t.target)}</td>
        <td style="text-align:right;color:var(--amber)" class="mono hide-sm">${f(t.stop)}</td>
        <td style="text-align:right" class="mono">${t.barsSeen||0}</td></tr>`;
    }
    h+=`</tbody></table>`;
  } else { h+=`<p style="color:var(--dim);font-size:12px;font-family:var(--f-mono)">Ninguna abierta ahora.</p>`; }

  // Cerradas
  h+=`<h2 style="font-family:var(--f-display);font-size:16px;margin:22px 0 6px">Operaciones cerradas (${cerradas.length})</h2>`;
  if(cerradas.length){
    h+=`<table><thead><tr><td>Símbolo</td><td>Tipo</td><td style="text-align:right">Entrada</td><td style="text-align:right">Salida</td><td style="text-align:right">Result.</td><td>Motivo</td><td style="text-align:right" class="hide-sm">Cerrada</td></tr></thead><tbody>`;
    for(const t of cerradas){
      const amb=t.ambiguous?` <span title="La vela tocó stop y objetivo el mismo día — resuelto por proximidad, revisar" style="color:var(--amber);cursor:help">⚠</span>`:'';
      h+=`<tr><td class="sym">${t.sym}</td>
        <td><span style="color:${SIG_COLOR[t.signal]}">${sigTxt(t.signal)}</span> ${icon(t.eliteClass)}</td>
        <td style="text-align:right" class="mono">${f(t.entry)}</td>
        <td style="text-align:right" class="mono">${f(t.exitPrice)}</td>
        <td style="text-align:right;color:${pnlCol(t.pnlPct)};font-weight:700" class="mono">${t.pnlPct>=0?'+':''}${t.pnlPct}%${amb}</td>
        <td style="font-size:11px;color:${t.closeReason==='objetivo'?'var(--emerald)':t.closeReason==='stop'?'var(--ember)':'var(--dim)'}">${t.closeReason||'—'}</td>
        <td style="text-align:right;font-size:11px;color:var(--dim)" class="hide-sm">${fmtTs(t.closedAt)}</td></tr>`;
    }
    h+=`</tbody></table>`;
  } else { h+=`<p style="color:var(--dim);font-size:12px;font-family:var(--f-mono)">Aún no se ha cerrado ninguna. Necesita días para acumular.</p>`; }

  // Por clase
  if(seg.stats.byClass&&Object.keys(seg.stats.byClass).length){
    h+=`<h2 style="font-family:var(--f-display);font-size:16px;margin:22px 0 6px">Por tipo de alerta (real)</h2>
      <table><thead><tr><td>Tipo</td><td style="text-align:right">Acierto</td><td style="text-align:right">Gan/op</td><td style="text-align:right">Cerradas</td><td style="text-align:right">Abiertas</td></tr></thead><tbody>`;
    for(const c of ['caida_giro','caida_recorrido','empuje_favor','rango_extendido','corto_favor','corto_estrecho']){
      const b=seg.stats.byClass[c]; if(!b)continue;
      h+=`<tr><td>${icon(c)} ${LABEL_NAME[c]||c}</td>
        <td style="text-align:right" class="mono">${b.wr!=null?b.wr+'%':'—'}</td>
        <td style="text-align:right;color:${pnlCol(b.pnl||0)}" class="mono">${b.pnl!=null?(b.pnl>=0?'+':'')+b.pnl+'%':'—'}</td>
        <td style="text-align:right" class="mono">${b.n||0}</td>
        <td style="text-align:right;color:var(--sapphire)" class="mono">${b.open||0}</td></tr>`;
    }
    h+=`</tbody></table>`;
  }
  return h;
}
function openModal(key){MODAL.key=key;MODAL.filter='all';renderModal();document.getElementById('overlay').classList.add('on');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('overlay').classList.remove('on');document.body.style.overflow='';}
function setFilter(fl){MODAL.filter=fl;renderModal();}
function renderModal(){
  const s=STATE.signals[MODAL.key];if(!s){closeModal();return;}
  const col=SIG_COLOR[s.signal]||'var(--sub)',ic=icon(s.labelClass);
  const hist=STATE.history[MODAL.key];const trades=(hist&&hist.trades)?hist.trades:[];
  const lvl=(k,v,c)=>`<div class="lvl"><div class="lk">${k}</div><div class="lv" style="${c?'color:'+c:''}">${v}</div></div>`;
  const tgtPct=(s.target&&s.entry)?((s.target-s.entry)/s.entry*100):null;
  const stopPct=(s.stop&&s.entry)?((s.stop-s.entry)/s.entry*100):null;
  let lvlsHtml=lvl('Entrada',f(s.entry))+lvl('PoC',f(s.poc),'var(--emerald)')+lvl('VAH',f(s.vah))+lvl('VAL',f(s.val))
    +lvl('Stop',f(s.stop)+(stopPct!=null?` <span style="font-size:9px">(${stopPct.toFixed(1)}%)</span>`:''),'var(--amber)')
    +lvl('Objetivo',f(s.target)+(tgtPct!=null?` <span style="font-size:9px">(${tgtPct>=0?'+':''}${tgtPct.toFixed(1)}%)</span>`:''),'var(--emerald)')
    +lvl('Objetivo 2',f(s.target2),'var(--emerald)')+lvl('R:R',s.rr?'1:'+s.rr:'—','var(--violet)');
  const trend=s.trendBias>0?'Alcista ↑':s.trendBias<0?'Bajista ↓':'Neutra';
  let indHtml=lvl('RSI',s.clsRsi!=null?s.clsRsi.toFixed(0):'—')+lvl('Aceleración',s.clsAccel!=null?(s.clsAccel>0?'frenando ↑':'cayendo ↓'):'—')
    +lvl('Velas verdes',s.clsGreen??'—')+lvl('Tendencia',trend)+lvl('¿Cruce nuevo?',s.isNewCross?'Sí':'No');
  const bt=s.bt||{};
  const bs=(n,l,c)=>`<div class="bs"><div class="bn" style="${c?'color:'+c:''}">${n}</div><div class="bl">${l}</div></div>`;
  let btHtml=bs((bt.wr??'—')+'%','Acierto',bt.wr>=55?'var(--emerald)':bt.wr>=45?'var(--amber)':'var(--ember)')
    +bs((bt.avgPnl!=null?(bt.avgPnl>=0?'+':'')+bt.avgPnl+'%':'—'),'Gan/op',bt.avgPnl>=0?'var(--emerald)':'var(--ember)')
    +bs(bt.total??0,'Operaciones')+bs((bt.totalPnl!=null?(bt.totalPnl>=0?'+':'')+bt.totalPnl+'%':'—'),'PnL total',bt.totalPnl>=0?'var(--emerald)':'var(--ember)')
    +bs(bt.avgRR?'1:'+bt.avgRR:'—','R:R medio','var(--violet)');

  // Detalle individualizado: cómo rinde CADA tipo de etiqueta en ESTE activo.
  const stOf=arr=>{if(!arr.length)return null;const w=arr.filter(t=>t.outcome==='win').length;let a=0;for(const t of arr)a+=t.pnlPct;const wp=arr.filter(t=>t.pnlPct>0).map(t=>t.pnlPct);return{n:arr.length,wr:Math.round(w/arr.length*100),pnl:+(a/arr.length).toFixed(2),avgWin:wp.length?+(wp.reduce((x,y)=>x+y,0)/wp.length).toFixed(2):0};};
  const byLabel=[
    ['💎💎 Caída + giro fuerte', stOf(trades.filter(t=>t.labelClass==='caida_giro'))],
    ['💎 Caída con recorrido', stOf(trades.filter(t=>t.labelClass==='caida_recorrido'))],
    ['⭐ Empuje a favor', stOf(trades.filter(t=>t.labelClass==='empuje_favor'))],
    ['🚀 Rango extendido', stOf(trades.filter(t=>t.labelClass==='rango_extendido'))],
    ['🛡️ Corto a favor', stOf(trades.filter(t=>t.labelClass==='corto_favor'))],
    ['🎯 Corto en rango estrecho', stOf(trades.filter(t=>t.labelClass==='corto_estrecho'))],
  ].filter(([,s])=>s&&s.n>0);
  let labBreakHtml='';
  if(byLabel.length){
    labBreakHtml=`<div style="display:grid;grid-template-columns:auto repeat(4,1fr);gap:0 8px;font-family:var(--f-mono);font-size:11px;align-items:center">
      <div></div><div class="hd" style="font-size:8px;color:var(--dim);text-align:right;text-transform:uppercase">Acierto</div><div class="hd" style="font-size:8px;color:var(--dim);text-align:right;text-transform:uppercase">Gan/op</div><div class="hd" style="font-size:8px;color:var(--dim);text-align:right;text-transform:uppercase">Gan media</div><div class="hd" style="font-size:8px;color:var(--dim);text-align:right;text-transform:uppercase">Ops</div>`;
    for(const [lbl,st] of byLabel){
      labBreakHtml+=`<div style="color:var(--sub);font-size:10px;padding:4px 0;border-bottom:1px solid var(--rule)">${lbl}</div>
        <div style="text-align:right;padding:4px 0;border-bottom:1px solid var(--rule);font-weight:700">${st.wr}%</div>
        <div style="text-align:right;padding:4px 0;border-bottom:1px solid var(--rule);color:${st.pnl>=0?'var(--emerald)':'var(--ember)'}">${st.pnl>=0?'+':''}${st.pnl}%</div>
        <div style="text-align:right;padding:4px 0;border-bottom:1px solid var(--rule);color:var(--emerald)">+${st.avgWin}%</div>
        <div style="text-align:right;padding:4px 0;border-bottom:1px solid var(--rule);color:var(--dim)">${st.n}</div>`;
    }
    labBreakHtml+=`</div>`;
  } else labBreakHtml='<div style="color:var(--dim);font-size:12px;font-family:var(--f-mono)">Sin operaciones etiquetadas en este valor.</div>';
  let tr=trades;
  if(MODAL.filter==='win')tr=trades.filter(t=>t.outcome==='win');
  else if(MODAL.filter==='loss')tr=trades.filter(t=>t.outcome!=='win');
  else if(MODAL.filter==='labeled')tr=trades.filter(t=>t.labeled);
  tr=[...tr].sort((a,b)=>(b.entryTs||0)-(a.entryTs||0));
  const wins=trades.filter(t=>t.outcome==='win').length;
  const fbtn=(k,l)=>`<button class="${MODAL.filter===k?'on':''}" onclick="setFilter('${k}')">${l}</button>`;
  let trHtml=`<div class="tfilt">${fbtn('all','Todas ('+trades.length+')')}${fbtn('win','Ganan ('+wins+')')}${fbtn('loss','Pierden ('+(trades.length-wins)+')')}</div>`;
  if(tr.length){
    trHtml+=`<div style="max-height:300px;overflow-y:auto"><table class="thist">
      <tr class="h"><td>Fecha</td><td>Señal</td><td>Et.</td><td style="text-align:right">Entrada</td><td style="text-align:right">Salida</td><td style="text-align:center">Res.</td><td style="text-align:right">PnL</td><td style="text-align:right">Velas</td></tr>`;
    for(const t of tr){
      const c=SIG_COLOR[t.signal]||'var(--sub)',win=t.outcome==='win';
      trHtml+=`<tr><td>${fmtTs(t.entryTs)}</td><td style="color:${c}">${sigTxt(t.signal)}</td><td>${icon(t.labelClass)||'·'}</td>
        <td style="text-align:right">${f(t.entry)}</td><td style="text-align:right">${f(t.exitPrice)}</td><td style="text-align:center">${win?'✅':'❌'}</td>
        <td style="text-align:right;color:${t.pnlPct>=0?'var(--emerald)':'var(--ember)'};font-weight:700">${t.pnlPct>=0?'+':''}${t.pnlPct.toFixed(2)}%</td>
        <td style="text-align:right;color:var(--dim)">${t.barsToRes??'—'}</td></tr>`;
    }
    trHtml+=`</table></div>`;
  }else trHtml+=`<div style="color:var(--dim);font-size:12px;font-family:var(--f-mono);padding:12px 0">Sin operaciones en este filtro.</div>`;
  document.getElementById('modal').innerHTML=`
    <div class="m-hd"><span style="font-family:var(--f-display);font-size:20px;font-weight:800">${s.sym}</span>
      ${ic?`<span style="font-size:16px" title="${LABEL_NAME[s.labelClass]}">${ic}</span>`:''}
      <span class="tc-tf">${(s.tf||'').toUpperCase()}</span>
      <span style="font-family:var(--f-mono);font-size:11px;font-weight:700;color:${col}">${sigTxt(s.signal)}</span>
      <span style="font-size:11px;color:var(--dim)">${s.sector||''}</span>
      <button class="x" onclick="closeModal()">×</button></div>
    <div class="m-body">
      <div class="m-sec">Escenario</div><div class="scn">${s.scenario||'—'}</div>
      <div class="m-sec">Niveles y objetivos</div><div class="lvls">${lvlsHtml}</div>
      <div class="m-sec">Contexto (indicadores)</div><div class="lvls">${indHtml}</div>
      <div class="m-sec">Rendimiento histórico de ${s.sym} (${(s.tf||'').toUpperCase()})</div><div class="btstats">${btHtml}</div>
      <div class="m-sec">Rendimiento por tipo de alerta en ${s.sym}</div>${labBreakHtml}
      <div class="m-sec">Operaciones históricas (${trades.length})</div>${trHtml}
    </div>`;
}
function wire(){
  const q=document.getElementById('q');
  if(q)q.oninput=e=>{STATE.q=e.target.value;const p=q.selectionStart;render();const nq=document.getElementById('q');if(nq){nq.focus();nq.setSelectionRange(p,p);}};
  document.querySelectorAll('[data-s]').forEach(td=>td.onclick=()=>{const k=td.dataset.s;if(STATE.sort===k)STATE.dir*=-1;else{STATE.sort=k;STATE.dir=k==='sym'?1:-1;}render();});
}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
loadAll();
</script>
</body>
</html>
